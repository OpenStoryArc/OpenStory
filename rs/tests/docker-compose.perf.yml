services:
  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir", "/data/jetstream"]
    ports:
      - "4222"
    volumes:
      - nats-perf-data:/data
    cpus: ${NATS_CPU_LIMIT:-0.5}
    mem_limit: ${NATS_MEMORY_LIMIT:-256M}

  server:
    image: open-story:test
    command: ["serve", "--host", "0.0.0.0", "--port", "3002", "--data-dir", "/data", "--watch-dir", "/watch", "--nats-url", "nats://nats:4222"]
    ports:
      - "3002"
    volumes:
      - ${FIXTURE_DIR:-.}:/watch:ro
    environment:
      - NATS_URL=nats://nats:4222
    depends_on:
      - nats
    cpus: ${SERVER_CPU_LIMIT:-1.0}
    mem_limit: ${SERVER_MEMORY_LIMIT:-512M}

volumes:
  nats-perf-data:
