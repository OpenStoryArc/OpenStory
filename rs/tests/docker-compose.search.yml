services:
  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333"
      - "6334"

  server:
    image: open-story:test
    command:
      - "serve"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "3002"
      - "--data-dir"
      - "/data"
      - "--watch-dir"
      - "/watch"
      - "--semantic-enabled"
      - "--qdrant-url"
      - "http://qdrant:6334"
    ports:
      - "3002"
    volumes:
      - ${FIXTURE_DIR:-.}:/watch:ro
    depends_on:
      - qdrant
