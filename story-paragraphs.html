<style>

  .paragraph { background: #1f2335; border: 1px solid #2f3348; border-radius: 8px; margin: 12px 0; overflow: hidden; }
  .paragraph:hover { border-color: #3b4261; }
  .para-header { background: #24283b; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
  .para-id { font-size: 10px; font-mono; padding: 2px 6px; border-radius: 3px; }
  .para-id.main { background: #7aa2f720; color: #7aa2f7; border: 1px solid #7aa2f733; }
  .para-id.sub { background: #ff9e6420; color: #ff9e64; border: 1px solid #ff9e6433; }
  .para-badge { font-size: 9px; padding: 2px 8px; border-radius: 10px; font-weight: bold; text-transform: uppercase; }
  .para-badge.terminate { background: #9ece6a18; color: #9ece6a; border: 1px solid #9ece6a33; }

  .topic-sentence { padding: 10px 14px; font-size: 12px; }
  .topic-sentence .subject { color: #7aa2f7; font-weight: bold; }
  .topic-sentence .verb { color: #9ece6a; font-weight: bold; }
  .topic-sentence .object { color: #c0caf5; }
  .topic-sentence .subordinate { color: #7dcfff; font-size: 11px; display: block; padding-left: 20px; margin-top: 2px; }
  .topic-sentence .subordinate.delegatory { color: #ff9e64; }
  .topic-sentence .adverbial { color: #f7768e; font-size: 11px; display: block; padding-left: 20px; margin-top: 2px; }
  .topic-sentence .predicate { color: #9ece6a; display: block; padding-left: 20px; margin-top: 4px; }

  .sentences-toggle { padding: 4px 14px 8px; }
  .sentences-toggle button { font-size: 10px; color: #565f89; background: none; border: none; cursor: pointer; font-family: inherit; }
  .sentences-toggle button:hover { color: #7aa2f7; }

  .sentences { padding: 0 14px 10px; }
  .sentence { display: flex; gap: 8px; padding: 4px 0; border-bottom: 1px solid #2a2e42; font-size: 11px; align-items: flex-start; }
  .sentence:last-child { border-bottom: none; }
  .sentence-num { color: #3b4261; min-width: 24px; text-align: right; font-size: 10px; padding-top: 2px; }
  .sentence-verb { color: #9ece6a; min-width: 60px; font-weight: bold; }
  .sentence-object { color: #a9b1d6; flex: 1; }
  .sentence-tools { color: #565f89; font-size: 10px; }
  .sentence.terminal { background: #9ece6a08; border-radius: 4px; padding: 4px 6px; }
  .sentence.terminal .sentence-verb { color: #bb9af7; }

  .agent-nest { margin: 8px 14px 10px; border-left: 3px solid #ff9e64; padding-left: 12px; }
  .agent-nest .agent-header { font-size: 11px; color: #ff9e64; font-weight: bold; margin-bottom: 6px; cursor: pointer; }
  .agent-nest .agent-header:hover { color: #c0caf5; }
  .agent-nest .paragraph { margin: 4px 0; border-color: #ff9e6433; }
  .agent-nest .para-header { background: #1a1a2e; }

  .meta { font-size: 10px; color: #565f89; padding: 6px 14px; display: flex; gap: 12px; }
</style>

const story = document.getElementById('story');

// Render main turns as paragraphs
for (const turn of data.main_turns) {
  const para = document.createElement('div');
  para.className = 'paragraph';

  // Header
  const header = document.createElement('div');
  header.className = 'para-header';
  header.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px">
      <span class="para-id main">main 06907d46</span>
      <span style="color:#7aa2f7;font-weight:bold;font-size:12px">Turn ${turn.turn}</span>
      <span style="font-size:10px;color:#565f89">${turn.applies_count} applies</span>
    </div>
    <span class="para-badge terminate">${turn.is_terminal ? 'terminate' : 'continue'}</span>
  `;
  para.appendChild(header);

  // Topic sentence (the paragraph summary)
  const topic = document.createElement('div');
  topic.className = 'topic-sentence';
  let topicHtml = `<span class="subject">Claude</span> <span class="verb">${turn.verb}</span> <span class="object">${escHtml(turn.object)}</span>`;
  for (const sub of turn.subordinates) {
    const cls = sub.role === 'Delegatory' ? 'subordinate delegatory' : 'subordinate';
    topicHtml += `<span class="${cls}">├── ${sub.verb} ${escHtml(sub.object)} (${sub.tool_calls})</span>`;
  }
  if (turn.adverbial) {
    topicHtml += `<span class="adverbial">└── because ${escHtml(turn.adverbial)}</span>`;
  }
  topicHtml += `<span class="predicate">→ ${turn.predicate}</span>`;
  topic.innerHTML = topicHtml;
  para.appendChild(topic);

  // Agent delegations — nested paragraphs
  if (turn.agent_applies.length > 0) {
    for (const agent of turn.agent_applies) {
      const nest = document.createElement('div');
      nest.className = 'agent-nest';

      const agentCycles = data.subagents[agent.agent_id] || [];
      const cycleCount = agentCycles.length;

      const agentHeader = document.createElement('div');
      agentHeader.className = 'agent-header';
      agentHeader.textContent = `▶ sub ${agent.agent_id.slice(0, 12)}: "${agent.description}" — ${cycleCount} sentences`;
      agentHeader.onclick = () => {
        const content = nest.querySelector('.agent-content');
        if (content.style.display === 'none') {
          content.style.display = 'block';
          agentHeader.textContent = agentHeader.textContent.replace('▶', '▼');
        } else {
          content.style.display = 'none';
          agentHeader.textContent = agentHeader.textContent.replace('▼', '▶');
        }
      };
      nest.appendChild(agentHeader);

      const agentContent = document.createElement('div');
      agentContent.className = 'agent-content';
      agentContent.style.display = 'none';

      // Render each cycle as a sentence
      for (const cycle of agentCycles) {
        const sent = document.createElement('div');
        sent.className = 'sentence' + (cycle.is_terminal ? ' terminal' : '');

        const toolNames = cycle.tools.map(t => t.name);
        let verb = 'checked';
        let obj = `${cycle.tools.length} items`;

        if (cycle.is_terminal) {
          verb = 'concluded';
          obj = 'analysis';
        } else if (toolNames.every(t => t === 'Read')) {
          const files = cycle.tools.map(t => t.summary).filter(Boolean);
          verb = 'read';
          obj = files.length > 2 ? `${files.length} files` : files.join(', ') || 'files';
        } else if (toolNames.includes('Bash') && !toolNames.includes('Read')) {
          verb = 'explored';
          obj = 'structure';
        } else if (toolNames.includes('Grep') || toolNames.includes('Glob')) {
          verb = 'searched';
          obj = cycle.tools.find(t => t.name === 'Grep' || t.name === 'Glob')?.summary || 'codebase';
        } else if (toolNames.includes('Read')) {
          const files = cycle.tools.filter(t => t.name === 'Read').map(t => t.summary);
          verb = 'read';
          obj = files.length > 2 ? `${files.length} files` : files.join(', ');
        }

        sent.innerHTML = `
          <span class="sentence-num">${cycle.cycle}</span>
          <span class="sentence-verb">${verb}</span>
          <span class="sentence-object">${escHtml(obj)}</span>
          <span class="sentence-tools">${cycle.tools.length} tools</span>
        `;
        agentContent.appendChild(sent);
      }

      nest.appendChild(agentContent);
      para.appendChild(nest);
    }
  }

  // Meta
  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.innerHTML = `
    <span>${turn.applies_count} applies</span>
    <span>${turn.subordinates.length} subordinates</span>
    ${turn.agent_applies.length > 0 ? `<span style="color:#ff9e64">${turn.agent_applies.length} agents</span>` : ''}
  `;
  para.appendChild(meta);

  story.appendChild(para);
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
