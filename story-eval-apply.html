  .cycle.depth-0 { border-left: 3px solid #7aa2f7; }
  .cycle.depth-1 { border-left: 3px solid #ff9e64; }
  .cycle.depth-2 { border-left: 3px solid #bb9af7; }

  .cycle-id { font-size: 10px; padding: 2px 6px; border-radius: 3px; }
  .cycle-id.main { background: #7aa2f720; color: #7aa2f7; border: 1px solid #7aa2f733; }
  .cycle-id.sub { background: #ff9e6420; color: #ff9e64; border: 1px solid #ff9e6433; }
  .cycle-label { font-size: 10px; color: #565f89; }

  /* Eval phase */
  .eval-phase { padding: 8px 12px; border-left: 3px solid #9ece6a; margin: 6px 12px; background: #24283b; border-radius: 0 4px 4px 0; }
  .phase-label { font-size: 9px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .phase-label.eval { color: #9ece6a; }
  .phase-label.apply { color: #e0af68; }
  .phase-label.human { color: #7dcfff; }
  .eval-text { font-size: 11px; color: #a9b1d6; }

  /* Apply phase */
  .apply-phase { padding: 6px 12px; border-left: 3px solid #e0af68; margin: 4px 12px; background: #24283b; border-radius: 0 4px 4px 0; }
  .apply-tool { display: flex; gap: 8px; padding: 2px 0; font-size: 11px; }
  .tool-name { color: #e0af68; font-weight: bold; min-width: 40px; }
  .tool-target { color: #a9b1d6; }
  .tool-outcome { font-size: 10px; }
  .tool-outcome.read { color: #7dcfff; }
  .tool-outcome.modified { color: #e0af68; }
  .tool-outcome.created { color: #9ece6a; }
  .tool-outcome.command { color: #9ece6a; }
  .tool-outcome.search { color: #bb9af7; }

  /* Human input */
  .human-phase { padding: 8px 12px; border-left: 3px solid #7dcfff; margin: 6px 12px; background: #24283b; border-radius: 0 4px 4px 0; }
  .human-text { font-size: 11px; color: #c0caf5; }

  /* Agent delegation — recursive */
  .delegation { margin: 8px 12px; padding: 8px 0 8px 12px; border-left: 2px solid #ff9e6444; }
  .delegation-header { font-size: 10px; color: #ff9e64; font-weight: bold; margin-bottom: 4px; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
  .delegation-header:hover { background: #ff9e6410; }
  .delegation-content { display: none; }

  /* Cycle connector */
  .connector { text-align: center; color: #3b4261; font-size: 18px; margin: 2px 0; }

  /* Footer */
  .cycle-footer { padding: 4px 12px 6px; font-size: 10px; color: #565f89; display: flex; gap: 12px; }
</style>

const story = document.getElementById('story');

function renderCycle(cycle, depth, container) {
  const card = document.createElement('div');
  card.className = `cycle depth-${Math.min(depth, 2)}`;

  const isMain = depth === 0;
  const idClass = isMain ? 'main' : 'sub';
  const idLabel = isMain ? `main 06907d46` : `sub ${cycle.agent_id || '?'}`;

  // Header
  const header = document.createElement('div');
  header.className = 'cycle-header';
  header.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px">
      <span class="cycle-id ${idClass}">${idLabel}</span>
      <span class="cycle-label">${cycle.label || ''}</span>
    </div>
    ${cycle.is_terminal ? '<span class="terminal-badge">terminal</span>' : ''}
  `;
  card.appendChild(header);

  // Human phase (only on first cycle of a turn)
  if (cycle.human) {
    const human = document.createElement('div');
    human.className = 'human-phase';
    human.innerHTML = `<div class="phase-label human">human → eval</div><div class="human-text">${esc(cycle.human)}</div>`;
    card.appendChild(human);
  }

  // Eval phase
  if (cycle.eval_text) {
    const evalDiv = document.createElement('div');
    evalDiv.className = 'eval-phase';
    evalDiv.innerHTML = `<div class="phase-label eval">eval</div><div class="eval-text">${esc(cycle.eval_text.slice(0, 120))}${cycle.eval_text.length > 120 ? '...' : ''}</div>`;
    card.appendChild(evalDiv);
  }

  // Apply phase
  if (cycle.tools && cycle.tools.length > 0) {
    const applyDiv = document.createElement('div');
    applyDiv.className = 'apply-phase';
    applyDiv.innerHTML = `<div class="phase-label apply">apply (${cycle.tools.length})</div>`;

    for (const tool of cycle.tools) {
      const toolDiv = document.createElement('div');
      toolDiv.className = 'apply-tool';

      let outcomeClass = '';
      if (tool.name === 'Read') outcomeClass = 'read';
      else if (tool.name === 'Edit' || tool.name === 'Write') outcomeClass = 'modified';
      else if (tool.name === 'Bash') outcomeClass = 'command';
      else if (tool.name === 'Grep' || tool.name === 'Glob') outcomeClass = 'search';
      else if (tool.name === 'Agent') outcomeClass = '';

      toolDiv.innerHTML = `
        <span class="tool-name">${tool.name}</span>
        <span class="tool-target">${esc(tool.summary || '')}</span>
        ${outcomeClass ? `<span class="tool-outcome ${outcomeClass}">${outcomeClass}</span>` : ''}
      `;
      applyDiv.appendChild(toolDiv);

      // If this is an Agent tool, render the delegation recursively
      if (tool.name === 'Agent' && tool.agent_id && data.subagents[tool.agent_id]) {
        const delegation = document.createElement('div');
        delegation.className = 'delegation';

        const agentCycles = data.subagents[tool.agent_id];
        const delegHeader = document.createElement('div');
        delegHeader.className = 'delegation-header';
        delegHeader.textContent = `▶ sub ${tool.agent_id.slice(0,12)}: ${agentCycles.length} eval-apply cycles`;
        delegHeader.onclick = () => {
          const content = delegation.querySelector('.delegation-content');
          if (content.style.display === 'none') {
            content.style.display = 'block';
            delegHeader.textContent = delegHeader.textContent.replace('▶', '▼');
          } else {
            content.style.display = 'none';
            delegHeader.textContent = delegHeader.textContent.replace('▼', '▶');
          }
        };
        delegation.appendChild(delegHeader);

        const content = document.createElement('div');
        content.className = 'delegation-content';

        for (const agentCycle of agentCycles) {
          renderCycle({
            eval_text: agentCycle.eval,
            tools: agentCycle.tools,
            is_terminal: agentCycle.is_terminal,
            label: `cycle ${agentCycle.cycle}`,
            agent_id: tool.agent_id,
          }, depth + 1, content);
        }

        delegation.appendChild(content);
        applyDiv.appendChild(delegation);
      }
    }
    card.appendChild(applyDiv);
  }

  // Footer
  const footer = document.createElement('div');
  footer.className = 'cycle-footer';
  const toolCount = cycle.tools ? cycle.tools.length : 0;
  footer.innerHTML = `
    <span>${toolCount} tools</span>
    ${cycle.is_terminal ? '<span style="color:#9ece6a">→ terminal</span>' : '<span style="color:#e0af68">→ continue</span>'}
  `;
  card.appendChild(footer);

  container.appendChild(card);
}

// Render main turns — each turn is broken into its eval-apply cycles
// For now, render the turn as a single top-level cycle with all its tools
for (const turn of data.main_turns) {
  // Build the tools list including agent delegations
  const tools = [];
  for (const sub of turn.subordinates) {
    // Find matching agent applies
    const agentApply = turn.agent_applies.find(a => a.description && sub.object && sub.object.includes(a.description.slice(0, 20)));
    if (sub.role === 'Delegatory' && agentApply) {
      tools.push({ name: 'Agent', summary: sub.object, agent_id: agentApply.agent_id });
    }
  }
  // Add non-delegation tools
  for (const sub of turn.subordinates) {
    if (sub.role === 'Preparatory') {
      for (let i = 0; i < Math.min(sub.tool_calls, 3); i++) {
        tools.push({ name: 'Read', summary: sub.object.split(',')[i]?.trim() || '' });
      }
    } else if (sub.role === 'Verificatory') {
      tools.push({ name: 'Bash', summary: `${sub.tool_calls} checks` });
    }
  }

  renderCycle({
    human: turn.adverbial ? turn.adverbial.replace(/^"|"$/g, '') : null,
    eval_text: `Claude ${turn.verb} ${turn.object}`,
    tools: tools.length > 0 ? tools : null,
    is_terminal: turn.is_terminal,
    label: `Turn ${turn.turn} · ${turn.applies_count} applies`,
  }, 0, story);
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
