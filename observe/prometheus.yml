# Prometheus configuration for open-story observability stack.
# Scrapes:
#   - the open-story server /metrics endpoint (pipeline health)
#   - NATS exporter (JetStream stats)
#   - OTel Collector /metrics endpoint (Claude Code OTel re-exposed as Prometheus)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "open-story"
    static_configs:
      - targets: ["server:3002"]
    metrics_path: /metrics

  - job_name: "nats"
    static_configs:
      - targets: ["nats-exporter:7777"]

  - job_name: "claude-code"
    static_configs:
      - targets: ["otel-collector:8889"]
    metrics_path: /metrics
