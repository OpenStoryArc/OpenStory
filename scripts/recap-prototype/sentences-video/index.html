<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>OpenStory · Sentence Reel</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=block"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        margin: 0; width: 1920px; height: 1080px;
        overflow: hidden; background-color: #0a0e14;
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="33"
      data-width="1920"
      data-height="1080"
    >
      <div
        id="graphics-layer"
        data-composition-id="main-graphics"
        data-composition-src="compositions/main-graphics.html"
        data-start="0"
        data-duration="33"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
