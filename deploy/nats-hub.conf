# NATS Hub Server — runs on VPS behind Tailscale.
#
# Central JetStream broker that persists all events from all machines.
# Local services (OpenClaw publisher, Open Story consumer) connect on :4222.
# Remote leaf nodes connect on :7422 via Tailscale with token auth.
#
# The token applies to both client and leaf connections.
# Since :4222 is localhost-only (Docker) and :7422 is Tailscale-only,
# a shared token is fine — it prevents accidental connections.
#
# Usage (Docker):
#   Managed by docker-compose.prod.yml — see docs/deploy/distributed.md
#
# Usage (standalone):
#   nats-server -c deploy/nats-hub.conf

listen: 0.0.0.0:4222

jetstream {
    store_dir: /data/jetstream
    max_mem: 256MB
    # 4GB covers the ~1.3GB of configured stream sizes (events 1GB + patterns 256MB)
    # plus room for metadata, compaction intermediates, and future growth.
    # NatsBus::ensure_streams() hardcodes max_bytes: 1GB for the events stream,
    # so any value below ~1.3GB here will crash stream creation on startup.
    max_file: 4GB
}

max_payload: 8MB
http_port: 8222

# Token auth — applies to client and leaf connections.
# Generate: openssl rand -hex 24
authorization {
    token: "CHANGE_ME_generate_with_openssl_rand_hex_24"
}

# Leaf node listener — remote machines connect here via Tailscale.
leafnodes {
    listen: "0.0.0.0:7422"
}
