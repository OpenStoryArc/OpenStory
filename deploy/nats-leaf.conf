# NATS Leaf Node — runs on local machines (Mac, Linux, friend's computer).
#
# Connects to the central hub on the VPS via Tailscale.
# Open Story publishes to localhost:4222 — the leaf forwards events to the hub.
# Local JetStream stores events for local UI replay.
#
# Before using:
#   1. Replace CHANGE_ME_TOKEN with the token from deploy/nats-hub.conf
#   2. Replace CHANGE_ME_TAILSCALE_HOST with the VPS Tailscale hostname or IP
#      (e.g., debian-16gb-ash-1 or 100.x.y.z)
#
# Usage (standalone — recommended for Mac):
#   nats-server -c deploy/nats-leaf.conf
#
# Usage (Docker):
#   Managed by docker-compose.leaf.yml

listen: 127.0.0.1:4222

jetstream {
    store_dir: /tmp/nats-jetstream-leaf
    max_mem: 64MB
    max_file: 256MB
}

max_payload: 8MB
http_port: 8222

leafnodes {
    remotes [
        {
            url: "nats://CHANGE_ME_TOKEN@CHANGE_ME_TAILSCALE_HOST:7422"
        }
    ]
}
