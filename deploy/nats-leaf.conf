# NATS Leaf Node — runs on local machines (Mac, Linux, friend's computer).
#
# Connects to the central hub on the VPS via Tailscale.
# Open Story publishes to localhost:4222 — the leaf forwards events to the hub.
# Local JetStream stores events for local UI replay.
#
# Before using:
#   - Set NATS_LEAF_URL in .env (gitignored). Get the token from the hub's
#     deploy/nats-hub.conf — see docs/deploy/distributed.md. Format:
#       NATS_LEAF_URL=nats://<token>@<tailscale-host>:7422
#   - NATS conf only substitutes env vars for unquoted bare values, so the
#     whole URL (scheme + auth + host) lives in one variable.
#
# Usage (standalone — recommended for Mac):
#   set -a; source .env; set +a; nats-server -c deploy/nats-leaf.conf
#
# Usage (Docker):
#   Managed by docker-compose.leaf.yml

listen: 127.0.0.1:4222

jetstream {
    store_dir: /tmp/nats-jetstream-leaf
    max_mem: 256MB
    # Must be >= ~1.3GB to cover the stream budgets NatsBus::ensure_streams()
    # hardcodes (events: 1GB, patterns: 256MB). 4GB gives generous headroom
    # for metadata, compaction, and incoming replication from the hub.
    # Going smaller will crash stream creation on local Open Story startup.
    max_file: 4GB
}

max_payload: 8MB
http_port: 8222

leafnodes {
    remotes [
        {
            url: $NATS_LEAF_URL
        }
    ]
}
