# DEPRECATED — use docker-compose.infra.yml + docker-compose.agent.yml instead.
# See deploy/*.env.example for the new per-agent env file pattern.
# This file is kept as a rollback path only.
#
# Production deployment: OpenClaw + Open Story + Telegram bot.
#
# Sized for Hetzner CX32 (4 vCPU, 8GB RAM) or larger.
# Memory limits leave ~2GB for OS, Docker, Caddy, SSH sessions.
#
# Prerequisites:
#   docker build -f Dockerfile.prod -t open-story:prod .
#   docker build -t openclaw:latest ~/projects/openclaw
#   docker build -f Dockerfile.openclaw -t openclaw-mcp:latest .
#
# Create a .env file with:
#   ANTHROPIC_API_KEY=sk-ant-...
#   OPEN_STORY_API_TOKEN=<random-hex>
#   TELEGRAM_BOT_TOKEN=<from-botfather>
#   TELEGRAM_ALLOWED_USER_ID=<your-telegram-user-id>
#
# Also set for NATS leaf node auth:
#   NATS_LEAF_TOKEN=<openssl rand -hex 24>
#   TAILSCALE_IP=<your Tailscale IP, e.g. 100.x.y.z>
#
# Start:
#   docker compose -f docker-compose.prod.yml up -d

services:
  nats:
    image: nats:2-alpine
    command: ["-c", "/etc/nats/nats-hub.conf"]
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
      - "${TAILSCALE_IP:-0.0.0.0}:7422:7422"
    volumes:
      - nats-data:/data
      - ./deploy/nats-hub.conf:/etc/nats/nats-hub.conf:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  openclaw:
    image: openclaw-mcp:latest
    user: "0:0"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HOME=/home/node
      - NODE_OPTIONS=--max-old-space-size=2048
      - OPEN_STORY_API_URL=http://open-story:3002
    volumes:
      - openclaw-state:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
    ports:
      - "127.0.0.1:18789:18789"
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        mkdir -p /home/node/.openclaw/agents/main/agent /home/node/.openclaw/workspace
        # Install OpenStory skill into the workspace so the agent knows the tools exist.
        mkdir -p /home/node/.openclaw/workspace/.claude/skills/openstory
        cp /opt/mcp-server/SKILL.md /home/node/.openclaw/workspace/.claude/skills/openstory/SKILL.md 2>/dev/null || true
        cat > /home/node/.openclaw/openclaw.json << 'OCEOF'
        {"gateway":{"auth":{"mode":"token","token":"${OPENCLAW_AUTH_TOKEN}"},"controlUi":{"dangerouslyAllowHostHeaderOriginFallback":true},"http":{"endpoints":{"chatCompletions":{"enabled":true}}}},"agents":{"list":[{"id":"main","default":true,"workspace":"/home/node/.openclaw/workspace"}]},"mcp":{"servers":{"openstory":{"command":"uv","args":["run","--directory","/opt/mcp-server","python","server.py"],"env":{"OPENSTORY_URL":"http://open-story:3002","OPENSTORY_LABEL":"local"}}}}}
        OCEOF
        exec node openclaw.mjs gateway --bind lan --port 18789 --allow-unconfigured
    healthcheck:
      test: ["CMD", "node", "-e",
        "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3G

  open-story:
    image: open-story:prod
    user: "0:0"
    ports:
      - "127.0.0.1:3002:3002"
    volumes:
      - os-data:/data
      - openclaw-state:/pi-watch:ro
    environment:
      - OPEN_STORY_PI_WATCH_DIR=/pi-watch
      - OPEN_STORY_API_TOKEN=${OPEN_STORY_API_TOKEN:-}
      - OPEN_STORY_ALLOWED_ORIGINS=${OPEN_STORY_ALLOWED_ORIGINS:-}
      - OPEN_STORY_METRICS_ENABLED=true
      - OPEN_STORY_RETENTION_DAYS=${OPEN_STORY_RETENTION_DAYS:-90}
      - NATS_URL=nats://${NATS_LEAF_TOKEN}@nats:4222
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3002/api/sessions"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      openclaw:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  telegram-bot:
    build:
      context: ./telegram-bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS:-${TELEGRAM_ALLOWED_USER_ID:-}}
      - OPENCLAW_GATEWAY_URL=http://openclaw:18789
      - OPENCLAW_AGENT_ID=${OPENCLAW_AGENT_ID:-main}
      - OPENCLAW_AUTH_TOKEN=${OPENCLAW_AUTH_TOKEN:-}
    depends_on:
      openclaw:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  nats-data:
  os-data:
  openclaw-state:
  openclaw-workspace:
