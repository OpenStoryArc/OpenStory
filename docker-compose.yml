services:
  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir", "/data/jetstream"]
    ports:
      - "4222:4222"   # client connections
      - "8222:8222"   # HTTP monitoring
    volumes:
      - nats-data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  server:
    build:
      context: ./rs
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    volumes:
      - ./data:/data
      - ${CLAUDE_PROJECTS_DIR:-~/.claude/projects}:/watch:ro
    environment:
      - NATS_URL=nats://nats:4222
      - SEMANTIC_ENABLED=false
      - QDRANT_URL=http://qdrant:6334
    depends_on:
      - nats
    restart: unless-stopped

  ui:
    image: node:22-slim
    working_dir: /app
    command: sh -c "npm install && npx vite --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./ui:/app
    environment:
      - VITE_API_URL=http://server:3002
    depends_on:
      - server

volumes:
  nats-data:
  qdrant-data:
