services:
  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir", "/data/jetstream"]
    ports:
      - "4222:4222"   # client connections
      - "8222:8222"   # HTTP monitoring
    volumes:
      - nats-data:/data
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - openstory-mongo-data:/data/db
    restart: unless-stopped
    # Default backend for `just compose`. Server picks this up via the
    # OPEN_STORY_DATA_BACKEND=mongo env var below. To run with SQLite
    # instead, comment out this service and the env vars on `server`.

  server:
    build:
      context: ./rs
      dockerfile: Dockerfile
      args:
        # Build the binary with the mongo feature so the server can
        # actually use the mongo service above. Drop this arg if you
        # want a SQLite-only image.
        FEATURES: mongo
    ports:
      - "3002:3002"
    volumes:
      - ./data:/data
      - ${CLAUDE_PROJECTS_DIR:-~/.claude/projects}:/watch:ro
    environment:
      - NATS_URL=nats://nats:4222
      - OPEN_STORY_DATA_BACKEND=mongo
      - OPEN_STORY_MONGO_URI=mongodb://mongo:27017
      - OPEN_STORY_MONGO_DB=openstory
      # Stamp every CloudEvent with the host machine's identity (not the
      # container's transient ID). Set in your shell or .env, e.g.
      # `export OPEN_STORY_HOST=Katies-Mac-mini`. Unset → resolver falls
      # back to gethostname() inside the container, which returns the
      # Docker container ID and defeats the feature.
      - OPEN_STORY_HOST=${OPEN_STORY_HOST:-}
    depends_on:
      - nats
      - mongo
    restart: unless-stopped

  ui:
    image: node:22-slim
    working_dir: /app
    command: sh -c "npm install && npx vite --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./ui:/app
    environment:
      - VITE_API_URL=http://server:3002
    depends_on:
      - server

volumes:
  nats-data:
  openstory-mongo-data:
